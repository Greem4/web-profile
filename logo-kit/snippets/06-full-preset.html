<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>logo — full preset</title>
  <link rel="stylesheet" href="../logo.css" />
  <style>
    body {
      margin: 0; min-height: 100svh;
      display: grid; place-items: center;
      background:
        radial-gradient(ellipse at 50% -10%, #1a1d36 0%, transparent 55%),
        radial-gradient(ellipse at 50% 120%, #0a1426 0%, transparent 55%),
        #05060a;
    }
    .logo { --logo-url: url("../assets/logo-mask.png"); --logo-size: 280px; }
  </style>
</head>
<body>
  <div class="logo-halo">
    <div class="logo logo--glow logo--floating logo--parallax"></div>
  </div>
  <script src="../logo.js" defer></script>
</body>
</html>
