<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>logo — parallax</title>
  <link rel="stylesheet" href="../logo.css" />
  <style>
    body { margin: 0; min-height: 100svh; display: grid; place-items: center; background: #05060a; }
    .logo { --logo-url: url("../assets/logo-mask.png"); --logo-size: 240px; }
    p { position: fixed; bottom: 20px; left: 0; right: 0; text-align: center;
        color: #999; font: 14px/1.4 system-ui; }
  </style>
</head>
<body>
  <div class="logo logo--glow logo--parallax logo--floating"></div>
  <p>Двигай мышью — лого следит за курсором.</p>
  <script src="../logo.js" defer></script>
</body>
</html>
